<!DOCTYPE html>
<html>
<head>
  <title>Trainer Login - GymPro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-box">
    <h1>Trainer Login</h1>
    <p>Login to manage members</p>

    <input type="text" id="trainerPhone" placeholder="Trainer phone number">
    <input type="password" id="trainerPassword" placeholder="Password">

    <button type="button" onclick="trainerLogin()">Login</button>

    <p class="auth-link">
      Owner? <a href="index.html">Owner Login</a>
    </p>
  </div>

<script src="auth.js"></script>
</body>
</html>
