<!DOCTYPE html>
<html>
<head>
  <title>Register - GymPro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-box">
    <h1>Create Owner Account</h1>
    <p>Register your gym owner account</p>

    <input type="text" id="ruser" placeholder="Username">
    <input type="password" id="rpass" placeholder="Password">

    <button type="button" onclick="register()">Register</button>

    <p class="auth-link">
      Already have account? <a href="index.html">Login</a>
    </p>
  </div>

<script src="auth.js"></script>
</body>
</html>
