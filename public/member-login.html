<!DOCTYPE html>
<html>
<head>
  <title>Member Login - GymPro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-box">
    <h1>Member Login</h1>
    <p>Login to your member dashboard</p>

    <input type="text" id="memberPhone" placeholder="Phone number without +91">
    <input type="password" id="memberPassword" placeholder="Password">

    <button type="button" onclick="memberLogin()">Login</button>

    <p class="auth-link">
      Owner? <a href="index.html">Owner Login</a>
    </p>
  </div>

<script src="auth.js"></script>
</body>
</html>
