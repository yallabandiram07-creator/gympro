<!DOCTYPE html>
<html>
<head>
  <title>Gym Management Pro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 90%;
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .auth-box, .form-box, .list-box, .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .auth-wrapper {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-top: 50px;
    }

    .auth-box {
      width: 320px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    button {
      padding: 10px 18px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 8px;
    }

    button:hover {
      background: #0056b3;
    }

    .delete-btn {
      background: red;
    }

    .delete-btn:hover {
      background: darkred;
    }

    .logout-btn {
      background: #333;
    }

    .logout-btn:hover {
      background: #111;
    }

    .dashboard {
      display: flex;
      gap: 20px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 220px;
      text-align: center;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .form-box, .list-box {
      margin-bottom: 20px;
    }

    ul {
      padding-left: 0;
      list-style: none;
    }

    li {
      background: #f1f1f1;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      line-height: 1.7;
    }

    a {
      text-decoration: none;
      margin-right: 10px;
    }

    .info-text {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="authSection" class="container">
  <div class="auth-wrapper">

    <div class="auth-box">
      <h2>Login</h2>
      <input type="text" id="loginUsername" placeholder="Enter username">
      <input type="password" id="loginPassword" placeholder="Enter password">
      <button onclick="login()">Login</button>
    </div>

    <div class="auth-box">
      <h2>Register New Gym</h2>
      <input type="text" id="registerUsername" placeholder="Create username">
      <input type="password" id="registerPassword" placeholder="Create password">
      <button onclick="registerUser()">Register</button>
      <p class="info-text">Create a new gym owner account here.</p>
    </div>

  </div>
</div>

<div id="appSection" style="display:none;">
  <div class="container">

    <div class="top-bar">
      <div>
        <h1>🏋️ Gym Dashboard</h1>
        <p id="welcomeText"></p>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="dashboard">
      <div class="card">
        <h3>Total Members</h3>
        <h2 id="totalMembers">0</h2>
      </div>

      <div class="card">
        <h3>Total Revenue</h3>
        <h2>₹<span id="totalRevenue">0</span></h2>
      </div>

      <div class="card">
        <h3>Expiring Soon</h3>
        <h2 id="expiringSoon">0</h2>
      </div>
    </div>

    <div class="form-box">
      <h2>Add Member</h2>
      <form id="memberForm">
        <input type="text" id="name" placeholder="Member Name" required>
        <input type="text" id="phone" placeholder="Phone Number" required>
        <input type="number" id="plan" placeholder="Plan (days)" required>
        <input type="number" id="fees" placeholder="Fees" required>
        <button type="submit">Add Member</button>
      </form>
    </div>

    <div class="list-box">
      <h2>Members List</h2>
      <ul id="memberList"></ul>
    </div>

  </div>
</div>

<script>
  let currentUser = localStorage.getItem("currentUser") || null;
  let users = JSON.parse(localStorage.getItem("users")) || {};
  let members = [];

  if (currentUser) {
    openAppForUser(currentUser);
  }

  function saveUsers() {
    localStorage.setItem("users", JSON.stringify(users));
  }

  function registerUser() {
    let username = document.getElementById("registerUsername").value.trim();
    let password = document.getElementById("registerPassword").value.trim();

    if (username === "" || password === "") {
      alert("Please enter username and password");
      return;
    }

    if (users[username]) {
      alert("Username already exists");
      return;
    }

    users[username] = {
      password: password,
      members: []
    };

    saveUsers();

    document.getElementById("registerUsername").value = "";
    document.getElementById("registerPassword").value = "";

    alert("Registration successful. Now login.");
  }

  function login() {
    let username = document.getElementById("loginUsername").value.trim();
    let password = document.getElementById("loginPassword").value.trim();

    if (!users[username]) {
      alert("User not found");
      return;
    }

    if (users[username].password !== password) {
      alert("Wrong password");
      return;
    }

    localStorage.setItem("currentUser", username);
    openAppForUser(username);
  }

  function openAppForUser(username) {
    currentUser = username;
    members = users[currentUser].members || [];

    document.getElementById("authSection").style.display = "none";
    document.getElementById("appSection").style.display = "block";
    document.getElementById("welcomeText").textContent = "Logged in as: " + currentUser;

    displayMembers();
    updateDashboard();
  }

  function logout() {
    localStorage.removeItem("currentUser");
    currentUser = null;
    members = [];

    document.getElementById("authSection").style.display = "block";
    document.getElementById("appSection").style.display = "none";

    document.getElementById("loginUsername").value = "";
    document.getElementById("loginPassword").value = "";
  }

  function saveCurrentUserMembers() {
    if (currentUser && users[currentUser]) {
      users[currentUser].members = members;
      saveUsers();
    }
  }

  document.getElementById("memberForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let plan = parseInt(document.getElementById("plan").value);
    let fees = parseInt(document.getElementById("fees").value);

    let today = new Date();
    let expiryDate = new Date();
    expiryDate.setDate(today.getDate() + plan);

    let member = {
      name: name,
      phone: phone,
      plan: plan,
      fees: fees,
      expiry: expiryDate.toDateString()
    };

    members.push(member);
    saveCurrentUserMembers();

    displayMembers();
    updateDashboard();
    document.getElementById("memberForm").reset();
  });

  function displayMembers() {
    let list = document.getElementById("memberList");
    list.innerHTML = "";

    let today = new Date();

    members.forEach((m, index) => {
      let expiry = new Date(m.expiry);
      let status = expiry >= today ? "✅ Active" : "❌ Expired";
      let whatsappLink = "https://wa.me/91" + m.phone;

      let li = document.createElement("li");
      li.innerHTML =
        "<strong>" + m.name + "</strong><br>" +
        "Phone: " + m.phone + "<br>" +
        "Plan: " + m.plan + " days<br>" +
        "Fees: ₹" + m.fees + "<br>" +
        "Expiry: " + m.expiry + "<br>" +
        "Status: " + status + "<br><br>" +
        `<a href="${whatsappLink}" target="_blank">📲 WhatsApp Message</a>` +
        `<button class="delete-btn" onclick="deleteMember(${index})">Delete</button>`;

      list.appendChild(li);
    });
  }

  function updateDashboard() {
    let totalMembers = members.length;
    let totalRevenue = 0;
    let expiringSoon = 0;
    let today = new Date();

    members.forEach(m => {
      totalRevenue += Number(m.fees);

      let expiry = new Date(m.expiry);
      let diff = (expiry - today) / (1000 * 60 * 60 * 24);

      if (diff <= 3 && diff >= 0) {
        expiringSoon++;
      }
    });

    document.getElementById("totalMembers").textContent = totalMembers;
    document.getElementById("totalRevenue").textContent = totalRevenue;
    document.getElementById("expiringSoon").textContent = expiringSoon;
  }

  function deleteMember(index) {
    members.splice(index, 1);
    saveCurrentUserMembers();
    displayMembers();
    updateDashboard();
  }
</script>

</body>
</html>
